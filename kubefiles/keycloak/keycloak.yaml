apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  labels:
    app: sso
  name: registry-sso
spec:
  additionalOptions:
    - name: proxy
      value: edge
  db:
    host: keycloak-db
    passwordSecret:
      key: password
      name: keycloak-db-secret
    usernameSecret:
      key: username
      name: keycloak-db-secret
    vendor: postgres
  hostname:
    hostname: <hostname>
  http:
    httpEnabled: true
  ingress:
    className: openshift-default
  instances: 1
